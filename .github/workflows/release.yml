name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## What's Changed
            See [CHANGELOG.md](https://github.com/TGRRRR/heading-outliner/blob/main/CHANGELOG.md) for details.
          files: |
            main.js
            manifest.json
            styles.css
